# Application identity
spring.application.name=policy-service
server.port=8081

# MySQL datasource configuration (local dev DB)
spring.datasource.url=jdbc:mysql://localhost:3306/policydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=policy_user
spring.datasource.password=policy_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true